<script>
  const API = 'https://gridv21-api-3-05s4.onrender.com/v1/permits';

  function toggleForm() {
    document.getElementById('addForm').classList.toggle('active');
    document.getElementById('msg').innerHTML = '';
  }

  async function addPermit() {
    const city = document.getElementById('newCity').value;
    const type = document.getElementById('newType').value;
    const status = document.getElementById('newStatus').value;

    if (!city ||!type) {
      alert('City and Type required');
      return;
    }

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          city: city,
          permit_type: type,
          status: status,
          issued_date: new Date().toISOString().split('T')[0]
        })
      });

      if (res.ok) {
        document.getElementById('msg').innerHTML = '<div class="success">Permit added!</div>';
        document.getElementById('newCity').value = '';
        document.getElementById('newType').value = '';
        toggleForm();
        loadPermits();
      } else {
        const err = await res.json();
        throw new Error(err.error || 'Failed to save');
      }
    } catch (err) {
      alert('Error: ' + err.message);
    }
  }

  async function loadPermits() {
    const city = document.getElementById('cityFilter').value;
    const status = document.getElementById('statusFilter').value;
    document.getElementById('list').innerHTML = '<div class="loading">Loading...</div>';

    let url = API + '?';
    if (city) url += `city=${encodeURIComponent(city)}&`;
    if (status) url += `status=${encodeURIComponent(status)}&`;

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`API error: ${res.status}`);

      const result = await res.json();

      // Handle both {count, data} or just array
      const data = result.data || result;
      const count = result.count || data.length;

      document.getElementById('stats').innerHTML = `${count} permits found`;

      if (count === 0 ||!data) {
        document.getElementById('list').innerHTML = '<div class="loading">No permits found</div>';
        return;
      }

      document.getElementById('list').innerHTML = data.map(p => `
        <div class="card">
          <h3>${p.city || 'Unknown City'}</h3>
          <div class="row">
            <span class="label">Type</span>
            <span class="value">${p.permit_type || '-'}</span>
          </div>
          <div class="row">
            <span class="label">Status</span>
            <span class="status ${p.status?.toLowerCase()}">${p.status || '-'}</span>
          </div>
          <div class="row">
            <span class="label">Issued</span>
            <span class="value">${p.issued_date? new Date(p.issued_date).toLocaleDateString() : '-'}</span>
          </div>
        </div>
      `).join('');
    } catch (err) {
      document.getElementById('stats').innerHTML = 'Error';
      document.getElementById('list').innerHTML = `<div class="loading">Error: ${err.message}<br><br>Check Render logs. API might be sleeping.</div>`;
    }
  }

  loadPermits();
  document.getElementById('cityFilter').addEventListener('keyup', e => {
    if (e.key === 'Enter') loadPermits();
  });
          </script>
